<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Voli Mensile ✈️</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --trn-color: #00a698; --mxp-color: #05203c; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }

        .container { background: white; padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 500px; width: 100%; text-align: center; }
        
        h1 { color: #333; font-size: 1.5rem; margin-bottom: 20px; }
        
        /* Selezione Aeroporto */
        .airport-selector { display: flex; gap: 10px; margin-bottom: 25px; }
        .air-btn { flex: 1; padding: 15px; border: 2px solid #eee; border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.3s; background: white; text-align: center; }
        
        .air-btn.active[data-air="TRN"] { border-color: var(--trn-color); color: var(--trn-color); background: #e6f6f5; }
        .air-btn.active[data-air="MXP"] { border-color: var(--mxp-color); color: var(--mxp-color); background: #e6eaef; }

        /* Griglia Mesi */
        .month-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .month-card { 
            background: #f8f9fa; border: 1px solid #eee; padding: 15px 5px; border-radius: 12px; 
            cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .month-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); background: white; border-color: #00a698; }
        .month-card i { font-size: 1.2rem; color: #00a698; }
        .month-name { font-weight: bold; font-size: 0.85rem; text-transform: uppercase; color: #444; }

        .footer { margin-top: 20px; font-size: 0.8rem; color: #7f8c8d; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-calendar-alt"></i> Offerte per Mese</h1>
    
    <div class="airport-selector">
        <div class="air-btn active" data-air="TRN" onclick="setAirport('TRN')">
            <i class="fas fa-plane"></i><br>TORINO
        </div>
        <div class="air-btn" data-air="MXP" onclick="setAirport('MXP')">
            <i class="fas fa-plane"></i><br>MALPENSA
        </div>
    </div>

    <div class="month-grid" id="gridMesi">
        </div>

    <div class="footer">
        <i class="fas fa-info-circle"></i> Ricerca voli diretti A/R • 2 Adulti • 2026
    </div>
</div>

<script>
    let currentAirport = 'TRN';
    const mesi = [
        "Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", 
        "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"
    ];

    function setAirport(code) {
        currentAirport = code;
        document.querySelectorAll('.air-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.air-btn[data-air="${code}"]`).classList.add('active');
    }

    function generaGriglia() {
        const grid = document.getElementById('gridMesi');
        mesi.forEach((mese, index) => {
            const mIndex = (index + 1).toString().padStart(2, '0');
            const card = document.createElement('div');
            card.className = 'month-card';
            card.onclick = () => vaiASkyscanner(mIndex);
            card.innerHTML = `
                <i class="far fa-calendar-check"></i>
                <div class="month-name">${mese}</div>
            `;
            grid.appendChild(card);
        });
    }

    function vaiASkyscanner(meseNum) {
        // Formato corretto per la ricerca "Intero Mese": 2026-MM
        const dateParam = `2026-${meseNum}`; 
        
        // URL ricostruito per forzare la ricerca mensile corretta
        const url = `https://www.skyscanner.it/trasporti/voli/${currentAirport.toLowerCase()}/?adultsv2=2&cabinclass=economy&childrenv2=&inboundaltsenabled=false&is_generated=true&outboundaltsenabled=false&preferdirects=true&ref=home&rtn=1&outbound_dates=${dateParam}&inbound_dates=${dateParam}`;
        
        window.open(url, '_blank');
    }

    generaGriglia();
</script>

</body>
</html>
