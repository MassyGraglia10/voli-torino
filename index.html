<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Voli Torino ✈️</title>
    
    <link rel="manifest" href="manifest.json">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/984/984233.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/984/984233.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }

        h1 { color: #00a698; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        p { color: #666; margin-bottom: 30px; }

        .btn-skyscanner {
            background-color: #00a698;
            color: white;
            border: none;
            padding: 20px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }

        .btn-skyscanner:hover {
            background-color: #008479;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,166,152,0.3);
        }

        .icon-plane {
            font-size: 3rem;
            transform: rotate(-45deg);
        }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-plane-departure"></i> Torino Voli</h1>
    <p>Cerca le migliori offerte A/R dirette da Caselle su Skyscanner</p>

    <button onclick="vaiASkyscanner()" class="btn-skyscanner">
        <i class="fas fa-plane icon-plane"></i>
        TROVA TUTTE LE DESTINAZIONI
    </button>

    <div style="margin-top: 25px; font-size: 0.85rem; color: #7f8c8d;">
        <i class="fas fa-check-circle"></i> Solo voli diretti • Andata e Ritorno
    </div>
</div>

<script>
    function vaiASkyscanner() {
        const url = "https://www.skyscanner.it/trasporti/voli/trn/?adultsv2=2&cabinclass=economy&childrenv2=&inboundaltsenabled=false&is_generated=true&outboundaltsenabled=false&preferdirects=true&ref=home&rtn=1";
        window.open(url, '_blank');
    }
</script>

</body>
</html>
