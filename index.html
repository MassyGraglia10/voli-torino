<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Voli Diretti da Torino (TRN)</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #f0f2f5; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #007bff; font-size: 1.8rem; margin-bottom: 10px; }
        p { color: #555; margin-bottom: 30px; }
        .btn { 
            text-decoration: none; 
            color: white; 
            background: #28a745; 
            padding: 20px; 
            border-radius: 12px; 
            display: block; 
            font-weight: bold;
            font-size: 1.2rem;
            transition: transform 0.2s, background 0.2s;
            margin-bottom: 15px;
        }
        .btn:hover { background: #218838; transform: scale(1.02); }
        .btn-google { background: #ea4335; font-size: 1rem; padding: 15px; }
        .btn-google:hover { background: #d33828; }
        .badge {
            background: #e1f5fe;
            color: #0288d1;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="badge">SOLO VOLI DIRETTI</span>
        <h1>✈️ Torino -> Ovunque</h1>

            Esplora Mappa Google (A/R)
        </a>
    </div>

    <p style="margin-top: 20px; font-size: 0.8rem; color: #888;">Aggiornato automaticamente dai motori di ricerca</p>
