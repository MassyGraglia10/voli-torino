<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voli Low Cost da Torino</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; text-align: center; padding: 20px; }
        .grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 30px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 200px; }
        a { text-decoration: none; color: white; background: #007bff; padding: 10px 15px; border-radius: 5px; display: inline-block; margin-top: 10px; }
        a:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>✈️ Offerte da Torino (TRN)</h1>
    <p>Clicca per vedere i prezzi più bassi aggiornati in tempo reale:</p>

    <div class="grid">
        <div class="card">
            <h3>🌍 Ovunque</h3>
            <p>Trova la meta più economica</p>
            <a href="https://www.skyscanner.it/trasporti/voli/trn/?flexible_days_tic=true&include-unpriced-itineraries=true&sortby=lowest_price" target="_blank">Controlla</a>
        </div>

        <div class="card">
            <h3>🇪🇺 Europa</h3>
            <p>Voli diretti low-cost</p>
            <a href="https://www.google.com/travel/flights/search?tfs=CBwQAhoeEgoyMDI0LTA0LTAxagwIAxIIL20vMGZ0Z3ZAAUgBcAGCAQsI____________AZgBAg" target="_blank">Vedi su Google</a>
        </div>
    </div>
</body>
</html>
