<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voli Low Cost da Torino (TRN)</title>
    <style>
        :root {
            --primary: #007bff;
            --secondary: #28a745;
            --dark: #343a40;
            --light: #f8f9fa;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--light); 
            color: var(--dark);
            margin: 0;
            padding: 20px;
            text-align: center; 
        }
        header { margin-bottom: 40px; }
        h1 { color: var(--primary); margin-bottom: 10px; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; 
            max-width: 1000px; 
            margin: 0 auto; 
        }
        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
            transition: transform 0.2s;
            border-top: 5px solid var(--primary);
        }
        .card:hover { transform: translateY(-5px); }
        .card.featured { border-top-color: var(--secondary); }
        .card h3 { margin-top: 0; font-size: 1.5rem; }
        .price-info { color: #666; font-size: 0.9rem; margin-bottom: 20px; }
        .btn { 
            text-decoration: none; 
            color: white; 
            background: var(--primary); 
            padding: 12px 20px; 
            border-radius: 8px; 
            display: block; 
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.8; }
        .btn-green { background: var(--secondary); }
        footer { margin-top: 50px; font-size: 0.8rem; color: #888; }
    </style>
</head>

        </div>
