<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Voli Mensile 2026 ✈️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --trn: #00a698; --mxp: #05203c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.1); max-width: 480px; width: 100%; text-align: center; }
        h1 { color: #333; font-size: 1.4rem; margin-bottom: 20px; }
        .airport-selector { display: flex; gap: 12px; margin-bottom: 25px; }
        .air-btn { flex: 1; padding: 15px; border: 2px solid #eee; border-radius: 16px; cursor: pointer; font-weight: 800; transition: 0.3s; background: white; font-size: 0.9rem; }
        .air-btn.active[data-air="TRN"] { border-color: var(--trn); color: var(--trn); background: #e6f6f5; }
        .air-btn.active[data-air="MXP"] { border-color: var(--mxp); color: var(--mxp); background: #e6eaef; }
        .month-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .month-card { 
            background: #ffffff; border: 1.5px solid #eee; padding: 18px 5px; border-radius: 14px; 
            cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .month-card:hover { border-color: var(--trn); background: #f0fdfa; transform: translateY(-3px); }
        .month-card i { font-size: 1.3rem; color: #00a698; }
        .month-name { font-weight: 700; font-size: 0.8rem; text-transform: uppercase; color: #555; }
        .footer { margin-top: 25px; font-size: 0.8rem; color: #999; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-search-location"></i> Destinazioni 2026</h1>
    
    <div class="airport-selector">
        <div class="air-btn active" data-air="trn" onclick="setAirport('trn')">TORINO</div>
        <div class="air-btn" data-air="mxp" onclick="setAirport('mxp')">MALPENSA</div>
    </div>

    <div class="month-grid" id="gridMesi"></div>

    <div class="footer">
        <i class="fas fa-check-circle"></i> Voli Diretti • 2 Adulti • Intero Mese
    </div>
</div>

<script>
    let currentAir = 'trn';
    const mesi = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];

    function setAirport(code) {
        currentAir = code;
        document.querySelectorAll('.air-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.air-btn[data-air="${code}"]`).classList.add('active');
    }

    function generaGriglia() {
        const grid = document.getElementById('gridMesi');
        mesi.forEach((mese, index) => {
            const mNum = (index + 1).toString().padStart(2, '0');
            const card = document.createElement('div');
            card.className = 'month-card';
            card.onclick = () => vai(mNum);
            card.innerHTML = `<i class="fas fa-calendar-day"></i><div class="month-name">${mese}</div>`;
            grid.appendChild(card);
        });
    }

    function vai(m) {
        // NUOVO URL "FLESSIBILE" PER FORZARE IL MESE
        // Formato: /trn/anywhere/2026-05/2026-05/
        const baseUrl = `https://www.skyscanner.it/trasporti/voli/${currentAir}/anywhere/2026-${m}/2026-${m}/`;
        
        // Parametri aggiuntivi per forzare 2 adulti e voli diretti
        const params = `?adultsv2=2&cabinclass=economy&preferdirects=true&rtn=1`;
        
        window.open(baseUrl + params, '_blank');
    }

    generaGriglia();
</script>
</body>
</html>
