<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Voli Torino ✈️</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }

        h1 { color: #00a698; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; }

        .btn-skyscanner {
            background-color: #00a698;
            color: white;
            border: none;
            padding: 20px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn-skyscanner:hover {
            background-color: #008479;
            transform: translateY(-2px);
        }

        .emoji { font-size: 2rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>Torino Voli Diretti</h1>
    <p>Cerca le migliori offerte A/R da Caselle su Skyscanner</p>

    <button onclick="vaiASkyscanner()" class="btn-skyscanner">
        <span class="emoji">🌍</span>
        TROVA TUTTE LE DESTINAZIONI
    </button>

    <div style="margin-top: 20px; font-size: 0.8rem; color: #999;">
        Solo voli diretti • Andata e Ritorno
    </div>
</div>

<script>
    function vaiASkyscanner() {
        // Link Skyscanner impostato su: 
        // Partenza: TRN (Torino)
        // Arrivo: Everywhere (Ovunque)
        // Filtro: Solo voli diretti (directOnly=true)
        const url = "https://www.skyscanner.it/trasporti/voli/trn/?adultsv2=2&cabinclass=economy&childrenv2=&inboundaltsenabled=false&is_generated=true&outboundaltsenabled=false&preferdirects=true&ref=home&rtn=1";
        window.open(url, '_blank');
    }
</script>

</body>
</html>
